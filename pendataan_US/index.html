<!DOCTYPE html>
<html lang="id">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pendataan US - SDN 006 Sungai Pinang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root { 
  --primary: #2563eb; --primary-dark: #1e40af; --secondary: #64748b; 
  --success: #10b981; --bg: #f1f5f9; --card-bg: #ffffff;
  --text-main: #1e293b; --accent: #dbeafe; --grid-color: #cbd5e1;
}

/* LOGIKA SAKLAR DINAMIS */
body[data-status="0"] .tombol-mulai { display: none !important; }
body[data-status="1"] .tombol-tutup { display: none !important; }

body { 
  font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; color: var(--text-main);
  line-height: 1.6; min-height: 100vh; display: flex; align-items: center; 
  justify-content: center; padding: 20px; box-sizing: border-box;
  background-color: var(--bg);
  background-image: radial-gradient(var(--grid-color) 1.5px, transparent 1.5px);
  background-size: 30px 30px;
}

.container { width: 100%; max-width: 650px; position: relative; z-index: 1; }
.card { background: var(--card-bg); padding: 40px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255,255,255,0.7); }
.page { display: none; }
.active { display: block; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 { font-size: 1.5rem; text-align: center; color: var(--primary); margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
.sub-header { text-align: center; font-size: 1.5rem; color: var(--secondary); margin-bottom: 30px; font-weight: 800; }
h3 { display: flex; align-items: center; gap: 10px; margin-top: 45px; color: var(--text-main); font-size: 1.15rem; font-weight: 800; padding-bottom: 12px; border-bottom: 2px solid var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; gap: 0; } }

label { font-weight: 600; margin-top: 20px; display: block; font-size: 0.85rem; color: var(--secondary); margin-left: 4px; }
input, select { width: 100%; padding: 14px 18px; margin-top: 8px; border-radius: 14px; border: 1.5px solid #e2e8f0; font-size: 15px; font-family: inherit; box-sizing: border-box; transition: all 0.2s ease; background: #ffffff; }
input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

button { border: none; padding: 18px 24px; border-radius: 16px; cursor: pointer; font-size: 1rem; font-weight: 700; width: 100%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-secondary { background: #f1f5f9; color: var(--secondary); }
button:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: none; }

#file-list { margin-top: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 16px; padding: 15px; }
.file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border: 1px solid #e2e8f0; margin-bottom: 8px; border-radius: 12px; font-size: 0.85rem; }
.file-name { cursor: pointer; color: var(--primary); font-weight: 600; text-decoration: underline; }
.remove-btn { color: #ef4444; font-weight: 700; cursor: pointer; padding: 5px 10px; border-radius: 8px; background: #fef2f2; }

.modal-preview { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
.modal-body { background: white; padding: 10px; border-radius: 20px; max-width: 90%; max-height: 90%; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
.modal-body img { max-width: 100%; max-height: 80vh; border-radius: 12px; display: block; }
.close-preview { position: absolute; top: -15px; right: -15px; width: 35px; height: 35px; background: #ef4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; }

.notice { background: #f0fdf4; color: #166534; padding: 20px; border-radius: 18px; margin-top: 30px; font-size: 0.9rem; border: 1px solid #dcfce7; }
.notice label { margin: 0; display: flex; align-items: center; gap: 12px; color: #166534; cursor: pointer; }
.notice input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--success); }

.spinner { animation: spin 1s linear infinite; font-size: 24px; color: var(--primary); }
@keyframes spin { 100% { transform:rotate(360deg); } }

.logo-box { width: 140px; height: 140px; background: #fff; margin: -90px auto 20px; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
.logo-img { width: 110px; height: auto; }
</style>
</head>

<!-- BOOST: Jika di sisi GAS, status sudah ada saat loading HTML -->
<body data-status="0">

<div class="modal-preview" id="modalPreview" onclick="closePreview()">
  <div class="modal-body" onclick="event.stopPropagation()">
    <div class="close-preview" onclick="closePreview()"><i class="fas fa-times"></i></div>
    <img id="imgPreview" src="" alt="Preview">
  </div>
</div>

<div class="container">
  <div class="card">
    <div id="home" class="page active">
      <div class="logo-box">
        <img src="https://raw.githubusercontent.com/Bola11111/sdn006sp/refs/heads/main/Logo_Kota_Samarinda.png" alt="Logo" class="logo-img">
      </div>
      <h2>PENDATAAN UJIAN SEKOLAH</h2>
      <div class="sub-header">SD NEGERI 006 SUNGAI PINANG</div>
      
      <div class="notice" style="background: var(--accent); color: var(--primary-dark); border-color: #bfdbfe;">
        <strong><i class="fas fa-info-circle"></i> Informasi:</strong>
        <p style="margin: 8px 0 0 0; font-size: 0.85rem;">Isi data sesuai dokumen Akta Kelahiran, karena untuk penulisan E-Ijazah.</p>
      </div>

      <div style="margin-top: 30px;">
        <button class="btn-primary tombol-mulai" onclick="show('data')">Mulai Pengisian <i class="fas fa-chevron-right"></i></button>
        <button class="btn-primary tombol-tutup" disabled style="cursor: not-allowed; background: #cbd5e1; color: #64748b;">Pendataan ditutup <i class="fas fa-lock"></i></button> 
      </div>
    </div>

    <form id="mainForm">
      <div id="data" class="page">
        <h3><i class="fas fa-user-graduate"></i> Identitas Siswa</h3>
        <label><i class="fas fa-school"></i> Pilih Kelas</label>
        <select id="kelas" required><option value="">Memuat...</option></select>
        <div class="form-row">
          <div class="form-group"><label>NISN (10 Digit)</label><input id="nisn" type="text" inputmode="numeric" required></div>
          <div class="form-group"><label>NIS (Maks 10 Digit)</label><input id="nis" type="text" inputmode="numeric" required></div>
        </div>
        <label>Nama Lengkap (Sesuai Akta)</label><input id="nama" placeholder="Contoh: BUDI SANTOSO" required>
        <div class="form-row">
          <div class="form-group"><label>Tempat Lahir</label><input id="tempat_lahir" required></div>
          <div class="form-group"><label>Tanggal Lahir</label><input id="tanggal_lahir" type="date" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Jenis Kelamin</label><select id="jenis_kelamin" required><option value="">Memuat...</option></select></div>
          <div class="form-group"><label>Agama</label><select id="agama" required><option value="">Memuat...</option></select></div>
        </div>
        <label>Alamat Lengkap</label><input id="alamat" required>
        <label>Kecamatan</label><input id="kecamatan" required>
        <label>Nomor WhatsApp</label><input id="hp" type="text" inputmode="numeric" placeholder="08..." required>
        <h3><i class="fas fa-user-tie"></i> Data Orang Tua (Ayah)</h3>
        <label>Nama Ayah Kandung</label><input id="nama_ayah" required>
        <div class="form-row">
          <div class="form-group"><label>Pekerjaan</label><select id="pekerjaan_ayah" required><option value="">Memuat...</option></select></div>
          <div class="form-group"><label>Pendidikan</label><select id="pendidikan_ayah" required><option value="">Memuat...</option></select></div>
        </div>
        <label>Penghasilan</label><select id="penghasilan_ayah" required><option value="">Memuat...</option></select>
        <h3><i class="fas fa-user-nurse"></i> Data Orang Tua (Ibu)</h3>
        <label>Nama Ibu Kandung</label><input id="nama_ibu" required>
        <div class="form-row">
          <div class="form-group"><label>Pekerjaan</label><select id="pekerjaan_ibu" required><option value="">Memuat...</option></select></div>
          <div class="form-group"><label>Pendidikan</label><select id="pendidikan_ibu" required><option value="">Memuat...</option></select></div>
        </div>
        <label>Penghasilan</label><select id="penghasilan_ibu" required><option value="">Memuat...</option></select>
        <h3><i class="fas fa-star"></i> Lain-lain</h3>
        <div class="form-row">
          <div class="form-group"><label>Hobi</label><select id="hobi" required><option value="">Memuat...</option></select></div>
          <div class="form-group"><label>Cita-cita</label><select id="cita" required><option value="">Memuat...</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Transportasi</label><select id="transport" required><option value="">Memuat...</option></select></div>
          <div class="form-group"><label>Jarak</label><select id="jarak" required><option value="">Memuat...</option></select></div>
        </div>
        <h3><i class="fas fa-file-upload"></i> Unggah Berkas</h3>
        <label>Foto Akta/KK (Maks 5) - Klik nama file untuk preview</label>
        <input id="files-input" type="file" multiple accept="image/*,.pdf">
        <div id="file-list"><span>Belum ada file.</span></div>
        <div class="notice">
          <label><input type="checkbox" id="cek" required><span>dengan ini saya menyatakan data sudah sesuai untuk penulisan E-Ijazah.</span></label>
        </div>
        <div id="loader" style="display:none; text-align:center; margin:30px 0;">
          <i class="fas fa-circle-notch spinner"></i><p style="margin-top:10px; font-weight:600;">Mengirim data...</p>
        </div>
        <div class="btn-group" id="action-buttons" style="display: flex; flex-direction: column; gap: 12px; margin-top: 30px;">
          <button type="button" class="btn-primary" id="btnKirim" onclick="kirim()" disabled><i class="fas fa-paper-plane"></i> Kirim Data</button>
          <button type="button" class="btn-secondary" onclick="show('home')">Kembali</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
let storageFiles = [];
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNn7P--FUxifLjVwGvADSQlANWVsRew5mKgbOSlCsUQd2jt2NkjyrYevHSpVFLfpjC/exec";

// 1. BOOST LOADING LOGIC
// Scriptlet GAS (Hanya jalan saat dideploy di GAS)
const injectedConfig = '<?!= typeof serverConfig !== "undefined" ? serverConfig : "" ?>';

window.onload = function() {
  if (injectedConfig) {
    // BOOST: Jika ada data suntikan server, langsung pakai (0ms Delay)
    populateConfig(JSON.parse(injectedConfig));
  } else {
    // FALLBACK: Jika di luar GAS (GitHub/Blog), gunakan fetch
    loadConfig();
  }
};

async function loadConfig() {
  try {
    const res = await fetch(SCRIPT_URL, { 
      method: 'POST', 
      body: JSON.stringify({ action: "getConfig" }) 
    });
    if(typeof google !== 'undefined') {
       google.script.run.withSuccessHandler(populateConfig).fetchConfigData();
    } else {
       const config = await res.json();
       populateConfig(config);
    }
  } catch(e) { console.error("Config Load Failed", e); }
}

function populateConfig(config) {
  document.body.setAttribute('data-status', config.status_buka);
  const opts = config.options;
  const fill = (id, list) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.innerHTML = '<option value="">-- Pilih --</option>' + list.map(v => `<option>${v}</option>`).join('');
  };
  fill('kelas', opts.kd_kelas || []);
  fill('jenis_kelamin', opts.kd_kelamin || []);
  fill('agama', opts.kd_agama || []);
  fill('pekerjaan_ayah', opts.kd_pekerjaan || []);
  fill('pekerjaan_ibu', opts.kd_pekerjaan || []);
  fill('pendidikan_ayah', opts.kd_pendidikan || []);
  fill('pendidikan_ibu', opts.kd_pendidikan || []);
  fill('penghasilan_ayah', opts.kd_gaji || []);
  fill('penghasilan_ibu', opts.kd_gaji || []);
  fill('hobi', opts.kd_hobi || []);
  fill('cita', opts.kd_cita || []);
  fill('transport', opts.kd_transportasi || []);
  fill('jarak', opts.kd_jarak || []);
}

// 2. INPUT FORMATTING (Preservasi V1)
function formatEYD(str) { return str.toLowerCase().replace(/(^|\s|\.)\S/g, (l) => l.toUpperCase()); }
function setupInputListeners() {
  document.querySelectorAll('#nama, #nama_ayah, #nama_ibu, #tempat_lahir, #alamat, #kecamatan').forEach(el => {
    el.addEventListener('input', function() {
      let start = this.selectionStart;
      this.value = formatEYD(this.value);
      this.setSelectionRange(start, start);
    });
  });
  document.getElementById('nisn').addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 10); });
  document.getElementById('nis').addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 10); });
  document.getElementById('hp').addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 13); });
}
setupInputListeners();

// 3. NAVIGASI & PREVIEW
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

const fileInput = document.getElementById('files-input');
fileInput.addEventListener('change', function(e) {
  [...e.target.files].forEach(file => { if(storageFiles.length < 5) storageFiles.push(file); });
  renderFiles();
  cekValidasi();
});

function renderFiles() {
  const list = document.getElementById('file-list');
  if(storageFiles.length === 0) { list.innerHTML = "Belum ada file."; return; }
  list.innerHTML = storageFiles.map((f, i) => `
    <div class="file-item">
      <span class="file-name" onclick="previewFile(${i})">📄 ${f.name}</span>
      <span class="remove-btn" onclick="hapusFile(${i})">Hapus</span>
    </div>`).join('');
}

function previewFile(i) {
  const file = storageFiles[i];
  if(!file.type.startsWith('image/')) return Swal.fire('Info', 'Hanya gambar yang bisa di-preview', 'info');
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('imgPreview').src = e.target.result;
    document.getElementById('modalPreview').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function closePreview() { document.getElementById('modalPreview').style.display = 'none'; }
function hapusFile(i) { storageFiles.splice(i, 1); renderFiles(); cekValidasi(); }

// 4. VALIDASI & KIRIM
document.getElementById('mainForm').addEventListener('input', cekValidasi);
document.getElementById('mainForm').addEventListener('change', cekValidasi);

function cekValidasi() {
  const nisnVal = document.getElementById('nisn').value;
  const nisVal = document.getElementById('nis').value;
  const hpVal = document.getElementById('hp').value;
  const isCekChecked = document.getElementById('cek').checked;
  const form = document.getElementById('mainForm');
  const isNisnValid = nisnVal.length === 10;
  const isNisValid = nisVal.length > 0;
  const isHpValid = hpVal.length >= 10;
  const isFormValid = form.checkValidity();
  document.getElementById('btnKirim').disabled = !(isFormValid && isNisnValid && isNisValid && isHpValid && isCekChecked);
}

async function kirim() {
  const loader = document.getElementById('loader');
  const actionButtons = document.getElementById('action-buttons');
  actionButtons.style.display = "none";
  loader.style.display = "block";

  try {
    const readAsBase64 = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve({ data: reader.result.split(',')[1], type: file.type, ext: file.name.split('.').pop() });
      reader.readAsDataURL(file);
    });

    const fileData = await Promise.all(storageFiles.map(readAsBase64));
    const dataObj = {
      action: "submit",
      kelas: document.getElementById('kelas').value,
      nisn: document.getElementById('nisn').value.trim(),
      nis: document.getElementById('nis').value.trim(),
      nama: document.getElementById('nama').value.trim(),
      tempat_lahir: document.getElementById('tempat_lahir').value.trim(),
      tanggal_lahir: document.getElementById('tanggal_lahir').value,
      jenis_kelamin: document.getElementById('jenis_kelamin').value,
      agama: document.getElementById('agama').value,
      alamat: document.getElementById('alamat').value.trim(),
      kecamatan: document.getElementById('kecamatan').value.trim(),
      hp: document.getElementById('hp').value.trim(),
      nama_ayah: document.getElementById('nama_ayah').value.trim(),
      pekerjaan_ayah: document.getElementById('pekerjaan_ayah').value,
      pendidikan_ayah: document.getElementById('pendidikan_ayah').value,
      penghasilan_ayah: document.getElementById('penghasilan_ayah').value,
      nama_ibu: document.getElementById('nama_ibu').value.trim(),
      pekerjaan_ibu: document.getElementById('pekerjaan_ibu').value,
      pendidikan_ibu: document.getElementById('pendidikan_ibu').value,
      penghasilan_ibu: document.getElementById('penghasilan_ibu').value,
      hobi: document.getElementById('hobi').value,
      cita: document.getElementById('cita').value,
      transport: document.getElementById('transport').value,
      jarak: document.getElementById('jarak').value,
      files: fileData 
    };

    if(typeof google !== 'undefined') {
       google.script.run.withSuccessHandler(successFlow).processSubmission(dataObj);
    } else {
       await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataObj) });
       successFlow();
    }
  } catch (err) {
    Swal.fire('Error', 'Gagal mengirim data.', 'error');
    actionButtons.style.display = "flex";
    loader.style.display = "none";
  }
}

function successFlow() {
  Swal.fire({
    icon: 'success', title: 'Data Terkirim!', text: 'Terima kasih, data berhasil diproses.', confirmButtonColor: '#2563eb'
  }).then(() => {
    document.getElementById('mainForm').reset();
    storageFiles = [];
    renderFiles();
    document.getElementById('loader').style.display = "none";
    document.getElementById('action-buttons').style.display = "flex";
    cekValidasi();
    show('home');
  });
}
</script>
</body>
</html>
