<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIS-EDU | School Information System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { background: rgba(255, 255, 255, 0.1); border-left: 4px solid #fff; }
        .loading-overlay { background: rgba(255,255,255,0.8); z-index: 9999; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 overflow-hidden">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-medium">Memproses...</p>
    </div>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-blue-600 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-school text-3xl text-blue-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">SIS-EDU LOGIN</h1>
                <p class="text-gray-500">Silakan masuk ke akun Anda</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition" required placeholder="admin">
                </div>
                <div class="mb-6 relative">
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none transition" required placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-10 text-gray-400 hover:text-gray-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                    <p id="loginError" class="text-red-500 text-xs mt-2 hidden"></p>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-300">
                    Masuk Sekarang
                </button>
            </form>
            <div class="mt-8 text-center text-xs text-gray-400">
                &copy; 2024 SIS-EDU School Management System
            </div>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="mainApp" class="hidden flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col transition-all duration-300" id="sidebar">
            <div class="p-6 border-b border-slate-800 flex items-center justify-between">
                <span class="font-bold text-xl tracking-tight">SIS-EDU</span>
                <button onclick="toggleSidebar()" class="lg:hidden text-white"><i class="fas fa-times"></i></button>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto">
                <button onclick="changeView('dashboard')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="dashboard">
                    <i class="fas fa-chart-pie w-6"></i> Dashboard
                </button>
                <div class="text-[10px] uppercase text-slate-500 font-bold px-4 mt-4 mb-2">Master Data</div>
                <button onclick="changeView('sekolah')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="sekolah">
                    <i class="fas fa-building w-6"></i> Data Sekolah
                </button>
                <button onclick="changeView('pegawai')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="pegawai">
                    <i class="fas fa-user-tie w-6"></i> Data Pegawai
                </button>
                <button onclick="changeView('siswa')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="siswa">
                    <i class="fas fa-user-graduate w-6"></i> Data Siswa
                </button>
                <div class="text-[10px] uppercase text-slate-500 font-bold px-4 mt-4 mb-2">Mutasi</div>
                <button onclick="changeView('mutasiMasuk')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="mutasiMasuk">
                    <i class="fas fa-sign-in-alt w-6"></i> Mutasi Masuk
                </button>
                <button onclick="changeView('mutasiKeluar')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="mutasiKeluar">
                    <i class="fas fa-sign-out-alt w-6"></i> Mutasi Keluar
                </button>
                
                <div id="adminMenu" class="hidden">
                    <div class="text-[10px] uppercase text-slate-500 font-bold px-4 mt-4 mb-2">Sistem</div>
                    <button onclick="changeView('pengaturan')" class="nav-link w-full flex items-center px-4 py-3 rounded-xl transition hover:bg-slate-800" data-view="pengaturan">
                        <i class="fas fa-cog w-6"></i> Manajemen Akun
                    </button>
                </div>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center space-x-3 px-4 mb-4">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs" id="userInitial">A</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium truncate" id="userName">User Name</p>
                        <p class="text-[10px] text-slate-400 capitalize" id="userRole">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center px-4 py-3 text-red-400 rounded-xl transition hover:bg-red-500 hover:text-white">
                    <i class="fas fa-power-off w-6"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-gray-100 overflow-hidden relative">
            
            <!-- Header -->
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600"><i class="fas fa-bars"></i></button>
                <h2 id="currentViewTitle" class="text-xl font-bold text-gray-700">Dashboard</h2>
                <div class="flex items-center space-x-4">
                    <button onclick="refreshData()" title="Muat Ulang" class="p-2 text-gray-500 hover:text-blue-600 transition">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <div id="currentTime" class="hidden md:block text-sm text-gray-500">Senin, 01 Jan 2024</div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="contentArea" class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Dashboard View -->
                <section id="view_dashboard" class="content-view">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-gray-500 text-sm mb-1">Total Siswa</p>
                                    <h3 class="text-3xl font-bold" id="stat_siswa">0</h3>
                                </div>
                                <div class="p-3 bg-blue-50 text-blue-600 rounded-xl"><i class="fas fa-user-graduate"></i></div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-gray-500 text-sm mb-1">Total Pegawai</p>
                                    <h3 class="text-3xl font-bold" id="stat_pegawai">0</h3>
                                </div>
                                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fas fa-user-tie"></i></div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-amber-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-gray-500 text-sm mb-1">Mutasi Masuk</p>
                                    <h3 class="text-3xl font-bold" id="stat_mm">0</h3>
                                </div>
                                <div class="p-3 bg-amber-50 text-amber-600 rounded-xl"><i class="fas fa-sign-in-alt"></i></div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-rose-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-gray-500 text-sm mb-1">Mutasi Keluar</p>
                                    <h3 class="text-3xl font-bold" id="stat_mk">0</h3>
                                </div>
                                <div class="p-3 bg-rose-50 text-rose-600 rounded-xl"><i class="fas fa-sign-out-alt"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm mb-8">
                        <h4 class="font-bold mb-6 flex items-center"><i class="fas fa-chart-bar mr-2 text-blue-600"></i> Statistik Data Sekolah</h4>
                        <div class="h-64"><canvas id="mainChart"></canvas></div>
                    </div>
                </section>

                <!-- Data Table Generic View -->
                <section id="view_table" class="content-view hidden">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                        <div class="flex items-center space-x-2">
                            <button onclick="openFormModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm flex items-center shadow-md">
                                <i class="fas fa-plus mr-2"></i> Tambah Baru
                            </button>
                        </div>
                        <div class="relative w-full md:w-72">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" onkeyup="filterTable(this.value)" placeholder="Cari nama..." class="w-full pl-10 pr-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left" id="dataTable">
                                <thead class="bg-gray-50 text-xs uppercase font-bold text-gray-500">
                                    <tr id="tableHeader"></tr>
                                </thead>
                                <tbody class="divide-y text-sm" id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- MODAL FORM (HIDDEN) -->
    <div id="formModal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold">Formulir Data</h3>
                <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto" id="formInputs">
                <!-- Inputs generated dynamically -->
            </div>
            <div class="p-6 border-t flex justify-end space-x-3 bg-gray-50 rounded-b-2xl">
                <button onclick="closeFormModal()" class="px-6 py-2 border rounded-lg hover:bg-white transition font-medium">Batal</button>
                <button onclick="submitForm()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-md font-medium">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        // GANTI INI DENGAN URL WEB APP GAS ANDA!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAYJGk7jSLn4Jo4ix8RS3IIypu7WSkgFR90gDlyRp6h8p_-FtsCIIyNIyCUEnVyz2wkA/exec"; 

        let currentUser = null;
        let currentView = 'dashboard';
        let rawData = [];
        let activeSheet = '';

        // --- AUTH ---
        window.onload = () => {
            const savedUser = localStorage.getItem('sis_user');
            if(savedUser) {
                currentUser = JSON.parse(savedUser);
                showApp();
            }
            updateClock();
            setInterval(updateClock, 60000);
        };

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if(pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('loginError');
            
            showLoader(true);
            try {
                const res = await callAPI('login', { username: user, password: pass });
                if(res.success) {
                    currentUser = res.data;
                    localStorage.setItem('sis_user', JSON.stringify(currentUser));
                    showApp();
                } else {
                    err.innerText = res.message;
                    err.classList.remove('hidden');
                }
            } catch (e) {
                Swal.fire('Error', 'Gagal menyambung ke server', 'error');
            }
            showLoader(false);
        }

        function showApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.nama;
            document.getElementById('userRole').innerText = currentUser.role;
            document.getElementById('userInitial').innerText = currentUser.nama[0];
            
            if(currentUser.role === 'admin') document.getElementById('adminMenu').classList.remove('hidden');
            
            changeView('dashboard');
        }

        function logout() {
            localStorage.removeItem('sis_user');
            location.reload();
        }

        // --- NAVIGATION ---
        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.content-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('sidebar-active'));
            
            const activeLink = document.querySelector(`.nav-link[data-view="${view}"]`);
            if(activeLink) activeLink.classList.add('sidebar-active');

            if(view === 'dashboard') {
                document.getElementById('view_dashboard').classList.remove('hidden');
                document.getElementById('currentViewTitle').innerText = 'Dashboard';
                loadDashboard();
            } else {
                document.getElementById('view_table').classList.remove('hidden');
                document.getElementById('currentViewTitle').innerText = 'Data ' + view.charAt(0).toUpperCase() + view.slice(1);
                loadTableData(view);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-ml-64');
            document.getElementById('sidebar').classList.toggle('lg:ml-0');
        }

        // --- API HANDLER ---
        async function callAPI(action, data = {}) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action, data })
            });
            return await response.json();
        }

        // --- DASHBOARD ---
        async function loadDashboard() {
            showLoader(true);
            const res = await callAPI('getDashboard');
            if(res.success) {
                document.getElementById('stat_siswa').innerText = res.data.stats.siswa;
                document.getElementById('stat_pegawai').innerText = res.data.stats.pegawai;
                document.getElementById('stat_mm').innerText = res.data.stats.mm;
                document.getElementById('stat_mk').innerText = res.data.stats.mk;
                renderChart(res.data.chart);
            }
            showLoader(false);
        }

        let myChart = null;
        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Siswa', 'Pegawai', 'M. Masuk', 'M. Keluar'],
                    datasets: [{
                        label: 'Jumlah Data',
                        data: data,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        // --- TABLE ENGINE ---
        async function loadTableData(view) {
            const sheetMap = {
                sekolah: 'Sekolah',
                pegawai: 'Pegawai',
                siswa: 'Siswa',
                mutasiMasuk: 'MutasiMasuk',
                mutasiKeluar: 'MutasiKeluar',
                pengaturan: 'Pengguna'
            };
            activeSheet = sheetMap[view];
            showLoader(true);
            const res = await callAPI('getData', { sheetName: activeSheet });
            if(res.success) {
                rawData = res.data;
                renderTable(rawData);
            }
            showLoader(false);
        }

        function renderTable(data) {
            const headerRow = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            headerRow.innerHTML = '';
            body.innerHTML = '';

            if(data.length === 0) {
                body.innerHTML = '<tr><td colspan="100%" class="p-8 text-center text-gray-400">Tidak ada data ditemukan</td></tr>';
                return;
            }

            // Pilih kolom penting saja untuk ditampilkan di tabel (mobile friendly)
            const keys = Object.keys(data[0]).filter(k => k !== 'id');
            const displayKeys = keys.slice(0, 5); 

            displayKeys.forEach(k => {
                headerRow.innerHTML += `<th class="px-6 py-4">${k.replace(/_/g, ' ')}</th>`;
            });
            headerRow.innerHTML += `<th class="px-6 py-4 text-right">Aksi</th>`;

            data.forEach(item => {
                let row = `<tr class="hover:bg-gray-50 transition">`;
                displayKeys.forEach(k => {
                    row += `<td class="px-6 py-4 whitespace-nowrap">${item[k] || '-'}</td>`;
                });
                row += `<td class="px-6 py-4 text-right">
                    <button onclick="openFormModal('${item.id}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg"><i class="fas fa-edit"></i></button>
                    <button onclick="confirmDelete('${item.id}')" class="text-red-600 hover:bg-red-50 p-2 rounded-lg"><i class="fas fa-trash"></i></button>
                </td></tr>`;
                body.innerHTML += row;
            });
        }

        function filterTable(val) {
            const filtered = rawData.filter(item => {
                return Object.values(item).some(v => v.toString().toLowerCase().includes(val.toLowerCase()));
            });
            renderTable(filtered);
        }

        // --- FORM ENGINE ---
        function openFormModal(id = null) {
            const modal = document.getElementById('formModal');
            const inputs = document.getElementById('formInputs');
            const title = document.getElementById('modalTitle');
            inputs.innerHTML = '';
            
            const data = id ? rawData.find(d => d.id === id) : {};
            title.innerText = id ? 'Edit Data' : 'Tambah Data Baru';
            
            if(id) inputs.innerHTML += `<input type="hidden" id="field_id" value="${id}">`;

            // Ambil struktur dari data yang ada atau default
            const schema = rawData.length > 0 ? Object.keys(rawData[0]) : [];
            
            schema.forEach(key => {
                if(key === 'id' || key === 'link_surat') return;
                const label = key.replace(/_/g, ' ').toUpperCase();
                inputs.innerHTML += `
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-500 mb-1">${label}</label>
                        <input type="text" id="field_${key}" value="${data[key] || ''}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                `;
            });

            modal.classList.remove('hidden');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.add('hidden');
        }

        async function submitForm() {
            const formData = {};
            const inputs = document.querySelectorAll('#formInputs input');
            inputs.forEach(input => {
                formData[input.id.replace('field_', '')] = input.value;
            });

            showLoader(true);
            const res = await callAPI('saveData', { sheetName: activeSheet, formData });
            showLoader(false);

            if(res.success) {
                Swal.fire('Berhasil', res.message, 'success');
                closeFormModal();
                loadTableData(currentView);
            }
        }

        function confirmDelete(id) {
            Swal.fire({
                title: 'Hapus data?',
                text: "Data yang dihapus tidak bisa dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoader(true);
                    const res = await callAPI('deleteData', { sheetName: activeSheet, id });
                    showLoader(false);
                    if(res.success) loadTableData(currentView);
                }
            });
        }

        // --- UTILS ---
        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function refreshData() {
            if(currentView === 'dashboard') loadDashboard();
            else loadTableData(currentView);
        }

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('currentTime').innerText = now.toLocaleDateString('id-ID', options);
        }
    </script>
</body>
</html>
